<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
<rect width="300" height="300" fill="#F5EFE6"/>

<g transform="translate(75, 60)">
  <!-- Main house shape -->
  <polygon points="75,15 145,65 145,185 5,185 5,65" fill="none" stroke="#2C1A0E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Roof left -->
  <line x1="0" y1="68" x2="75" y2="15" stroke="#2C1A0E" stroke-width="3" stroke-linecap="round"/>
  <!-- Roof right -->
  <line x1="150" y1="68" x2="75" y2="15" stroke="#2C1A0E" stroke-width="3" stroke-linecap="round"/>
  <!-- Door -->
  <rect x="55" y="120" width="40" height="65" fill="none" stroke="#2C1A0E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Window left -->
  <rect x="18" y="100" width="28" height="28" fill="none" stroke="#8B6347" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="100" x2="32" y2="128" stroke="#8B6347" stroke-width="1.5"/>
  <line x1="18" y1="114" x2="46" y2="114" stroke="#8B6347" stroke-width="1.5"/>
  <!-- Window right -->
  <rect x="104" y="100" width="28" height="28" fill="none" stroke="#8B6347" stroke-width="2" stroke-linecap="round"/>
  <line x1="118" y1="100" x2="118" y2="128" stroke="#8B6347" stroke-width="1.5"/>
  <line x1="104" y1="114" x2="132" y2="114" stroke="#8B6347" stroke-width="1.5"/>
  <!-- Ground line -->
  <line x1="-10" y1="185" x2="160" y2="185" stroke="#8B6347" stroke-width="1" stroke-dasharray="4,4"/>
</g>
</svg>
